<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOICE GUNS</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

  <!-- ───── 시작 화면 ───── -->
  <div id="start-screen">
    <div id="start-inner">

      <div id="title-block">
        <h1 id="game-title">VOICE GUNS</h1>
        <p id="game-subtitle">음성으로 발사하는 2인 슈팅 게임</p>
      </div>

      <div class="setup-row">
        <!-- P1 -->
        <div class="player-setup p1-setup">
          <div class="player-label p1-label">P1</div>
          <div class="controls-hint">이동 <kbd>A</kbd><kbd>D</kbd> &nbsp; 점프 <kbd>W</kbd> &nbsp; 내려가기 <kbd>S</kbd></div>
          <div class="keyword-section">
            <label class="keyword-label">발사 키워드</label>
            <input id="p1-input" class="keyword-input" type="text" placeholder="예: 불" maxlength="10" />
          </div>
        </div>

        <div id="vs-divider">VS</div>

        <!-- P2 -->
        <div class="player-setup p2-setup">
          <div class="player-label p2-label">P2</div>
          <div class="controls-hint">이동 <kbd>◀</kbd><kbd>▶</kbd> &nbsp; 점프 <kbd>▲</kbd> &nbsp; 내려가기 <kbd>▼</kbd></div>
          <div class="keyword-section">
            <label class="keyword-label">발사 키워드</label>
            <input id="p2-input" class="keyword-input" type="text" placeholder="예: 빵" maxlength="10" />
          </div>
        </div>
      </div>

      <div id="start-error"></div>
      <button id="start-btn" onclick="startGame()">확인</button>
      <p id="start-tip">서로 다른 키워드를 입력하세요</p>
    </div>
  </div>

  <!-- ───── 게임 화면 ───── -->
  <div id="game-container" style="display:none;">
    <div id="hud">
      <div id="voice-indicator">🎤 FIRE</div>
    </div>
    <div id="round-result">
      <h1 id="round-winner-text">P1 WINS</h1>
      <p>NEXT ROUND IN 3...</p>
    </div>
  </div>

  <script src="js/player.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/game.js"></script>

  <script>
    function setError(msg) {
      document.getElementById('start-error').textContent = msg;
    }

    ['p1-input', 'p2-input'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') startGame();
      });
    });

    function startGame() {
      const p1kw = document.getElementById('p1-input').value.trim().toLowerCase();
      const p2kw = document.getElementById('p2-input').value.trim().toLowerCase();

      if (!p1kw) { setError('P1 키워드를 입력해주세요!'); return; }
      if (!p2kw) { setError('P2 키워드를 입력해주세요!'); return; }
      if (p1kw === p2kw) { setError('⚠ 키워드가 같아요! 서로 다른 단어를 쓰세요.'); return; }

      window.VOICE_KEYWORDS = { p1: [p1kw], p2: [p2kw] };

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('game-container').style.display = 'block';
      initGame();
    }
  </script>

</body>
</html>
